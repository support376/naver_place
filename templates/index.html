<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>플레이스 진단</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #232734;
    --border: #2d3143;
    --text: #e4e6ed;
    --text2: #8b8fa3;
    --accent: #5b6cf7;
    --accent2: #7c8aff;
    --green: #00c48c;
    --yellow: #ffc542;
    --red: #ff6b6b;
    --orange: #ff9f43;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Pretendard', -apple-system, 'Malgun Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1e2140 0%, #2a1f4e 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 0 28px;
    text-align: center;
  }
  .header h1 { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
  .header h1 span { color: var(--accent2); }
  .header p { color: var(--text2); font-size: 14px; }

  /* TABS */
  .tabs {
    display: flex; justify-content: center; gap: 4px;
    margin-top: 20px;
  }
  .tab {
    padding: 10px 28px; border-radius: 8px; cursor: pointer;
    font-size: 14px; font-weight: 600; border: none;
    background: transparent; color: var(--text2); transition: all .2s;
  }
  .tab.active { background: var(--accent); color: #fff; }
  .tab:hover:not(.active) { background: var(--card2); color: var(--text); }

  /* CONTAINER */
  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  /* INPUT AREA */
  .input-area {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 24px;
  }
  .input-row {
    display: flex; gap: 10px; margin-bottom: 12px;
  }
  .input-row input {
    flex: 1; padding: 14px 18px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--card2);
    color: var(--text); font-size: 15px; outline: none;
    transition: border-color .2s;
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row input::placeholder { color: var(--text2); }
  .btn {
    padding: 14px 32px; border-radius: 10px; border: none;
    background: var(--accent); color: #fff; font-size: 15px;
    font-weight: 700; cursor: pointer; transition: all .2s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .btn-outline {
    background: transparent; border: 1px solid var(--border);
    color: var(--text2); font-weight: 600; padding: 10px 20px;
    font-size: 13px;
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: transparent; }

  /* COMPARE URLS */
  .compare-urls { display: flex; flex-direction: column; gap: 10px; }
  .compare-url-row {
    display: flex; gap: 10px; align-items: center;
  }
  .compare-url-row input { flex: 1; }
  .remove-url {
    width: 36px; height: 36px; border-radius: 8px; border: none;
    background: var(--card2); color: var(--red); cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
  }
  .remove-url:hover { background: rgba(255,107,107,.15); }
  .compare-actions { display: flex; gap: 10px; margin-top: 8px; }

  /* LOADING */
  .loading {
    text-align: center; padding: 60px; color: var(--text2);
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ERROR */
  .error-box {
    background: rgba(255,107,107,.1); border: 1px solid rgba(255,107,107,.3);
    border-radius: 12px; padding: 20px; text-align: center;
    color: var(--red); margin-bottom: 24px;
  }

  /* RESULT */
  .result { animation: fadeUp .4s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* PLACE HEADER */
  .place-header {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    display: flex; gap: 20px; align-items: center;
  }
  .place-photo {
    width: 80px; height: 80px; border-radius: 12px;
    background: var(--card2); object-fit: cover; flex-shrink: 0;
  }
  .place-info h2 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .place-info .meta { color: var(--text2); font-size: 13px; }
  .place-info .meta span { margin-right: 12px; }

  /* GRADE CARD */
  .grade-section {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    margin-bottom: 20px;
  }
  .grade-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    text-align: center;
  }
  .grade-circle {
    width: 140px; height: 140px; border-radius: 50%;
    margin: 0 auto 16px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border: 4px solid;
    position: relative;
  }
  .grade-letter {
    font-size: 52px; font-weight: 900; line-height: 1;
  }
  .grade-pct {
    font-size: 16px; font-weight: 600; margin-top: 2px;
  }
  .grade-text {
    font-size: 14px; color: var(--text2); margin-top: 8px;
  }
  .grade-score-text {
    font-size: 13px; color: var(--text2); margin-top: 4px;
  }

  /* CATEGORY SCORES */
  .scores-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 12px; margin-bottom: 20px;
  }
  .score-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .score-card .label {
    font-size: 13px; color: var(--text2); margin-bottom: 8px; font-weight: 600;
  }
  .score-card .value {
    font-size: 28px; font-weight: 800; margin-bottom: 8px;
  }
  .score-bar {
    height: 6px; background: var(--card2); border-radius: 3px; overflow: hidden;
  }
  .score-bar-fill {
    height: 100%; border-radius: 3px; transition: width .6s ease;
  }
  .score-details {
    margin-top: 12px; display: flex; flex-direction: column; gap: 4px;
  }
  .score-detail {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--text2);
  }
  .score-detail .check { color: var(--green); }
  .score-detail .cross { color: var(--red); }

  /* RECOMMENDATIONS */
  .recs-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
  }
  .recs-card h3 {
    font-size: 18px; font-weight: 700; margin-bottom: 16px;
  }
  .rec-item {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .rec-item:last-child { border-bottom: none; }
  .rec-badge {
    padding: 3px 10px; border-radius: 6px; font-size: 11px;
    font-weight: 700; flex-shrink: 0; margin-top: 2px;
  }
  .rec-badge.high { background: rgba(255,107,107,.15); color: var(--red); }
  .rec-badge.mid { background: rgba(255,197,66,.15); color: var(--yellow); }
  .rec-badge.low { background: rgba(0,196,140,.15); color: var(--green); }
  .rec-text { font-size: 14px; line-height: 1.6; }

  /* COMPARE RESULTS */
  .compare-result {
    animation: fadeUp .4s ease;
  }
  .compare-table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    overflow-x: auto;
  }
  .compare-table-wrap h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .compare-table {
    width: 100%; border-collapse: collapse; font-size: 14px;
  }
  .compare-table th, .compare-table td {
    padding: 12px 16px; text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .compare-table th {
    color: var(--text2); font-weight: 600; font-size: 12px;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .compare-table th:first-child, .compare-table td:first-child {
    text-align: left;
  }
  .compare-table .winner { color: var(--green); font-weight: 700; }
  .compare-table .loser { color: var(--text2); }
  .compare-grade {
    display: inline-block; padding: 4px 12px; border-radius: 6px;
    font-weight: 800; font-size: 16px;
  }
  .chart-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    max-width: 560px;
    margin-left: auto; margin-right: auto;
  }
  .chart-wrap h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; text-align: center; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .grade-section { grid-template-columns: 1fr; }
    .scores-grid { grid-template-columns: 1fr 1fr; }
    .place-header { flex-direction: column; text-align: center; }
  }
  @media (max-width: 480px) {
    .scores-grid { grid-template-columns: 1fr; }
    .input-row { flex-direction: column; }
  }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1><span>플레이스</span> 진단 리포트</h1>
  <p>네이버 플레이스 URL만 넣으면 세팅 상태를 바로 진단합니다</p>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('single')">내 매장 진단</button>
    <button class="tab" onclick="switchTab('compare')">경쟁매장 비교</button>
  </div>
</div>

<div class="container">
  <!-- ======== 단일 진단 ======== -->
  <div id="tab-single">
    <div class="input-area">
      <div class="input-row">
        <input type="text" id="url-input"
               placeholder="네이버 플레이스 URL을 붙여넣으세요 (예: https://m.place.naver.com/restaurant/12345678/home)"
               onkeydown="if(event.key==='Enter')analyzeSingle()">
        <button class="btn" id="analyze-btn" onclick="analyzeSingle()">진단하기</button>
      </div>
    </div>
    <div id="single-loading" class="loading hidden">
      <div class="spinner"></div>
      <p>플레이스 정보를 분석하고 있습니다...</p>
    </div>
    <div id="single-error" class="hidden"></div>
    <div id="single-result" class="hidden"></div>
  </div>

  <!-- ======== 비교 ======== -->
  <div id="tab-compare" class="hidden">
    <div class="input-area">
      <p style="font-size:14px;color:var(--text2);margin-bottom:14px;">비교할 매장 URL을 입력하세요 (최대 5개)</p>
      <div class="compare-urls" id="compare-urls">
        <div class="compare-url-row">
          <input type="text" placeholder="매장 1 URL" class="compare-input">
          <button class="remove-url" onclick="removeUrl(this)" title="삭제">&times;</button>
        </div>
        <div class="compare-url-row">
          <input type="text" placeholder="매장 2 URL" class="compare-input">
          <button class="remove-url" onclick="removeUrl(this)" title="삭제">&times;</button>
        </div>
      </div>
      <div class="compare-actions">
        <button class="btn-outline btn" onclick="addUrl()">+ URL 추가</button>
        <button class="btn" id="compare-btn" onclick="analyzeCompare()">비교 분석</button>
      </div>
    </div>
    <div id="compare-loading" class="loading hidden">
      <div class="spinner"></div>
      <p>매장 정보를 비교 분석하고 있습니다...</p>
    </div>
    <div id="compare-error" class="hidden"></div>
    <div id="compare-result" class="hidden"></div>
  </div>
</div>

<script>
// ====== TAB ======
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (tab==='single' ? i===0 : i===1));
  });
  document.getElementById('tab-single').classList.toggle('hidden', tab!=='single');
  document.getElementById('tab-compare').classList.toggle('hidden', tab!=='compare');
}

// ====== SINGLE ANALYSIS ======
async function analyzeSingle() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;

  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  show('single-loading'); hide('single-result'); hide('single-error');

  try {
    const resp = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url})
    });
    const data = await resp.json();
    if (data.error) {
      showError('single-error', data.error);
    } else {
      renderResult('single-result', data);
    }
  } catch(e) {
    showError('single-error', '서버 연결에 실패했습니다.');
  }
  hide('single-loading');
  btn.disabled = false;
}

// ====== COMPARE ======
function addUrl() {
  const wrap = document.getElementById('compare-urls');
  if (wrap.children.length >= 5) return;
  const div = document.createElement('div');
  div.className = 'compare-url-row';
  div.innerHTML = `
    <input type="text" placeholder="매장 ${wrap.children.length+1} URL" class="compare-input">
    <button class="remove-url" onclick="removeUrl(this)" title="삭제">&times;</button>
  `;
  wrap.appendChild(div);
}
function removeUrl(btn) {
  const wrap = document.getElementById('compare-urls');
  if (wrap.children.length <= 2) return;
  btn.parentElement.remove();
}

async function analyzeCompare() {
  const inputs = document.querySelectorAll('.compare-input');
  const urls = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
  if (urls.length < 2) { showError('compare-error', '최소 2개의 URL을 입력해주세요.'); return; }

  const btn = document.getElementById('compare-btn');
  btn.disabled = true;
  show('compare-loading'); hide('compare-result'); hide('compare-error');

  const results = [];
  for (const url of urls) {
    try {
      const resp = await fetch('/api/analyze', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({url})
      });
      const data = await resp.json();
      if (data.error) {
        results.push({error: data.error, url});
      } else {
        results.push(data);
      }
    } catch(e) {
      results.push({error: '분석 실패', url});
    }
  }

  const valid = results.filter(r => !r.error);
  if (valid.length < 2) {
    showError('compare-error', '분석 가능한 매장이 2개 미만입니다. URL을 확인해주세요.');
  } else {
    renderCompare('compare-result', valid);
  }
  hide('compare-loading');
  btn.disabled = false;
}

// ====== RENDER SINGLE ======
function renderResult(id, data) {
  const el = document.getElementById(id);
  const pd = data.place_data;
  const cats = ['basic','photo','menu','description','review','extra'];
  const catIcons = {basic:'📋', photo:'📸', menu:'🍽️', description:'✏️', review:'⭐', extra:'🔧'};

  let scoreCardsHtml = cats.map(key => {
    const s = data.scores[key];
    const pct = s.max > 0 ? (s.score/s.max)*100 : 0;
    const color = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--yellow)' : 'var(--red)';
    const detailsHtml = s.details.map(d =>
      `<div class="score-detail">
        <span>${d.ok ? '<span class="check">✓</span>' : '<span class="cross">✕</span>'} ${d.name}</span>
        <span>${d.score}/${d.max}</span>
      </div>`
    ).join('');
    return `
      <div class="score-card">
        <div class="label">${catIcons[key]} ${s.label}</div>
        <div class="value" style="color:${color}">${s.score}<span style="font-size:14px;color:var(--text2)">/${s.max}</span></div>
        <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="score-details">${detailsHtml}</div>
      </div>
    `;
  }).join('');

  const recsHtml = data.recommendations.length > 0
    ? data.recommendations.map(r => `
        <div class="rec-item">
          <span class="rec-badge ${r.priority}">${r.priority==='high'?'긴급':r.priority==='mid'?'권장':'참고'}</span>
          <span class="rec-text">${r.text}</span>
        </div>
      `).join('')
    : '<p style="color:var(--text2);text-align:center;padding:20px;">모든 항목이 잘 설정되어 있습니다! 👏</p>';

  const photoHtml = pd.representative_photo_url
    ? `<img class="place-photo" src="${pd.representative_photo_url}" alt="${pd.name}">`
    : `<div class="place-photo" style="display:flex;align-items:center;justify-content:center;font-size:28px;">🏪</div>`;

  el.innerHTML = `
    <div class="result">
      <div class="place-header">
        ${photoHtml}
        <div class="place-info">
          <h2>${pd.name || '알 수 없음'}</h2>
          <div class="meta">
            ${pd.category ? `<span>📂 ${pd.category}</span>` : ''}
            ${pd.address ? `<span>📍 ${pd.address}</span>` : ''}
            ${pd.phone ? `<span>📞 ${pd.phone}</span>` : ''}
          </div>
        </div>
      </div>

      <div class="grade-section">
        <div class="grade-card">
          <div class="grade-circle" style="border-color:${data.grade_color}">
            <div class="grade-letter" style="color:${data.grade_color}">${data.grade}</div>
            <div class="grade-pct" style="color:${data.grade_color}">${data.percentage}점</div>
          </div>
          <div class="grade-text">${data.grade_text}</div>
          <div class="grade-score-text">${data.total_score} / ${data.total_max}</div>
        </div>
        <div class="grade-card">
          <canvas id="radar-single" width="280" height="280"></canvas>
        </div>
      </div>

      <div class="scores-grid">${scoreCardsHtml}</div>

      <div class="recs-card">
        <h3>💡 개선 추천사항</h3>
        ${recsHtml}
      </div>
    </div>
  `;
  show(id);

  // Radar chart
  const ctx = document.getElementById('radar-single');
  if (ctx) {
    new Chart(ctx, {
      type: 'radar',
      data: {
        labels: cats.map(k => data.scores[k].label),
        datasets: [{
          label: pd.name,
          data: cats.map(k => {
            const s = data.scores[k];
            return s.max > 0 ? Math.round((s.score/s.max)*100) : 0;
          }),
          backgroundColor: 'rgba(91,108,247,.2)',
          borderColor: 'rgba(91,108,247,.8)',
          borderWidth: 2,
          pointBackgroundColor: 'rgba(91,108,247,1)',
        }]
      },
      options: {
        scales: {
          r: {
            beginAtZero: true, max: 100,
            grid: { color: 'rgba(255,255,255,.08)' },
            angleLines: { color: 'rgba(255,255,255,.08)' },
            pointLabels: { color: '#8b8fa3', font: { size: 12, weight: '600' } },
            ticks: { display: false }
          }
        },
        plugins: { legend: { display: false } }
      }
    });
  }
}

// ====== RENDER COMPARE ======
const CHART_COLORS = ['#5b6cf7','#00c48c','#ff6b6b','#ffc542','#a29bfe'];

function renderCompare(id, results) {
  const el = document.getElementById(id);
  const cats = ['basic','photo','menu','description','review','extra'];

  // 최고점 찾기
  const maxTotal = Math.max(...results.map(r => r.percentage));

  let tableRows = '';

  // 등급 행
  tableRows += '<tr><td style="font-weight:700">종합 등급</td>' +
    results.map(r => `<td><span class="compare-grade" style="background:${r.grade_color}22;color:${r.grade_color}">${r.grade}</span></td>`).join('') + '</tr>';

  // 총점 행
  tableRows += '<tr><td>총점</td>' +
    results.map(r => `<td class="${r.percentage===maxTotal?'winner':'loser'}">${r.percentage}점</td>`).join('') + '</tr>';

  // 카테고리별
  for (const key of cats) {
    const label = results[0].scores[key].label;
    const vals = results.map(r => r.scores[key]);
    const maxS = Math.max(...vals.map(v => v.score));
    tableRows += `<tr><td>${label}</td>` +
      vals.map(v => {
        const cls = v.score === maxS && results.length > 1 ? 'winner' : (v.score < maxS ? 'loser' : '');
        return `<td class="${cls}">${v.score}/${v.max}</td>`;
      }).join('') + '</tr>';
  }

  // 상세 행
  const detailRows = [
    ['사진 수', r => r.place_data.photo_count + '장'],
    ['메뉴 수', r => r.place_data.menu_count + '개'],
    ['리뷰 수', r => r.place_data.review_count + '개'],
    ['별점', r => r.place_data.review_rating > 0 ? r.place_data.review_rating.toFixed(1) : '-'],
    ['소개글', r => r.place_data.description_length > 0 ? r.place_data.description_length + '자' : '미작성'],
  ];
  for (const [label, fn] of detailRows) {
    tableRows += `<tr><td>${label}</td>` + results.map(r => `<td>${fn(r)}</td>`).join('') + '</tr>';
  }

  const headerCells = results.map((r, i) =>
    `<th style="color:${CHART_COLORS[i]}">${r.place_data.name || ('매장 '+(i+1))}</th>`
  ).join('');

  el.innerHTML = `
    <div class="compare-result">
      <div class="chart-wrap">
        <h3>항목별 비교</h3>
        <canvas id="radar-compare"></canvas>
      </div>
      <div class="compare-table-wrap">
        <h3>상세 비교표</h3>
        <table class="compare-table">
          <thead><tr><th>항목</th>${headerCells}</tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>
  `;
  show(id);

  // Radar chart
  const ctx = document.getElementById('radar-compare');
  if (ctx) {
    new Chart(ctx, {
      type: 'radar',
      data: {
        labels: cats.map(k => results[0].scores[k].label),
        datasets: results.map((r, i) => ({
          label: r.place_data.name || ('매장 '+(i+1)),
          data: cats.map(k => {
            const s = r.scores[k];
            return s.max > 0 ? Math.round((s.score/s.max)*100) : 0;
          }),
          backgroundColor: CHART_COLORS[i] + '22',
          borderColor: CHART_COLORS[i],
          borderWidth: 2,
          pointBackgroundColor: CHART_COLORS[i],
        }))
      },
      options: {
        scales: {
          r: {
            beginAtZero: true, max: 100,
            grid: { color: 'rgba(255,255,255,.08)' },
            angleLines: { color: 'rgba(255,255,255,.08)' },
            pointLabels: { color: '#8b8fa3', font: { size: 12, weight: '600' } },
            ticks: { display: false }
          }
        },
        plugins: {
          legend: {
            labels: { color: '#e4e6ed', font: { size: 12 } }
          }
        }
      }
    });
  }
}

// ====== UTIL ======
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }
function showError(id, msg) {
  const el = document.getElementById(id);
  el.innerHTML = `<div class="error-box">${msg}</div>`;
  show(id);
}
</script>

</body>
</html>
